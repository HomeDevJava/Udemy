spring.application.name=spb_jpa_hibernate

#Conexion a la base de datos Mariadb
spring.datasource.url=jdbc:mariadb://localhost:3306/springboot_db
spring.datasource.username=springuser
# Use an external secret or environment variable for the database password
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
#definir el pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

